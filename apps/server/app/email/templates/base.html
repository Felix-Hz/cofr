<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Cofr{% endblock %}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f9fafb;
      color: #4b5563;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .wrapper {
      padding: 48px 16px;
    }
    .container {
      max-width: 520px;
      margin: 0 auto;
      background-color: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
    }
    .header {
      padding: 32px 40px 24px;
      border-bottom: 1px solid #e5e7eb;
    }
    .logo-text {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.3px;
    }
    .body {
      padding: 32px 40px;
    }
    .body p {
      margin: 0 0 16px;
      font-size: 14px;
      line-height: 1.7;
      color: #4b5563;
    }
    .body p:last-child {
      margin-bottom: 0;
    }
    .cta-row {
      text-align: left;
      padding: 8px 0 8px;
    }
    .cta {
      display: inline-block;
      background-color: #10b981;
      color: #ffffff !important;
      text-decoration: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      letter-spacing: -0.1px;
    }
    .muted {
      font-size: 12px !important;
      color: #9ca3af !important;
      line-height: 1.6 !important;
    }
    .footer {
      padding: 20px 40px;
      border-top: 1px solid #e5e7eb;
    }
    .footer p {
      margin: 0;
      font-size: 12px;
      color: #9ca3af;
      line-height: 1.5;
    }
    .footer a {
      color: #9ca3af;
      text-decoration: underline;
    }

    @media only screen and (max-width: 480px) {
      .wrapper { padding: 24px 12px; }
      .header { padding: 24px 24px 20px; }
      .body { padding: 24px; }
      .footer { padding: 16px 24px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="header">
        <p class="logo-text">cofr</p>
      </div>
      <div class="body">
        {% block content %}{% endblock %}
      </div>
      <div class="footer">
        <p>&copy; {{ year | default("2026") }} Cofr</p>
      </div>
    </div>
  </div>
</body>
</html>
