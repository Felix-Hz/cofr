<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}cofr{% endblock %}</title>
  <style>
    body, table, td, a {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }
    table, td {
      mso-table-lspace: 0pt;
      mso-table-rspace: 0pt;
    }
    img {
      -ms-interpolation-mode: bicubic;
      border: 0;
      outline: none;
      text-decoration: none;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f9fafb;
      color: #4b5563;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .email-body {
      margin: 0;
      padding: 0;
      width: 100%;
      background:
        radial-gradient(circle at 12% 10%, rgba(209, 250, 229, 0.92), transparent 28%),
        radial-gradient(circle at 82% 8%, rgba(255, 255, 255, 0.95), transparent 22%),
        linear-gradient(180deg, #fdfefd 0%, #f6faf7 18%, #f9fafb 100%);
    }
    .preheader {
      display: none !important;
      visibility: hidden;
      opacity: 0;
      color: transparent;
      height: 0;
      width: 0;
      overflow: hidden;
      mso-hide: all;
      font-size: 1px;
      line-height: 1px;
      max-height: 0;
      max-width: 0;
    }
    .shell {
      padding: 24px 16px 40px;
    }
    .container {
      max-width: 520px;
      margin: 0 auto;
      background-color: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 22px 55px rgba(15, 23, 42, 0.08);
    }
    .hero {
      padding: 32px 40px 24px;
      background:
        radial-gradient(circle at top left, rgba(209, 250, 229, 0.95), transparent 36%),
        linear-gradient(180deg, #fdfefd 0%, #f7faf8 100%);
      border-bottom: 1px solid #e5e7eb;
    }
    .eyebrow {
      margin: 0;
      font-size: 12px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #10b981;
    }
    .brand {
      margin: 14px 0 0;
      font-size: 16px;
      line-height: 1.1;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: -0.03em;
    }
    .headline {
      margin: 8px 0 0;
      font-size: 26px;
      line-height: 1.12;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: -0.04em;
    }
    .body {
      padding: 32px 40px 28px;
    }
    .copy {
      margin: 0 0 18px;
      font-size: 15px;
      line-height: 1.75;
      color: #4b5563;
    }
    .copy:last-child {
      margin-bottom: 0;
    }
    .cta-row {
      text-align: left;
      padding: 10px 0 8px;
    }
    .cta {
      display: inline-block;
      background-color: #10b981;
      color: #ffffff !important;
      text-decoration: none;
      padding: 14px 26px;
      border-radius: 999px;
      font-size: 15px;
      line-height: 1;
      font-weight: 700;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      letter-spacing: -0.02em;
    }
    .note {
      margin: 18px 0 0;
      font-size: 13px;
      line-height: 1.7;
      color: #6b7280;
    }
    .link-panel {
      margin-top: 18px;
      padding: 16px 18px;
      background-color: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
    }
    .link-label {
      margin: 0 0 8px;
      font-size: 12px;
      line-height: 1.4;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #6b7280;
    }
    .link-copy {
      margin: 0;
      font-size: 13px;
      line-height: 1.75;
      color: #4b5563;
      word-break: break-all;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
    .footer {
      padding: 18px 40px 24px;
      border-top: 1px solid #e5e7eb;
    }
    .footer p {
      margin: 0;
      font-size: 12px;
      color: #9ca3af;
      line-height: 1.7;
    }
    .footer a {
      color: #9ca3af;
      text-decoration: underline;
    }

    @media only screen and (max-width: 480px) {
      .shell { padding: 14px 10px 24px; }
      .hero { padding: 24px 24px 20px; }
      .headline { font-size: 22px; }
      .body { padding: 24px 24px 22px; }
      .footer { padding: 16px 24px 20px; }
      .container { border-radius: 24px; }
      .cta {
        display: block;
        text-align: center;
      }
    }
  </style>
</head>
<body class="email-body">
  <div class="preheader">{% block preheader %}cofr account update.{% endblock %}</div>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" class="email-body">
    <tr>
      <td align="center" class="shell">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" class="container" style="max-width: 520px;">
          <tr>
            <td class="hero">
              <p class="eyebrow">{% block eyebrow %}cofr account{% endblock %}</p>
              <p class="brand">cofr</p>
              <h1 class="headline">{% block heading %}Account update{% endblock %}</h1>
            </td>
          </tr>
          <tr>
            <td class="body">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td class="footer">
              <p>&copy; {{ year | default("2026") }} cofr</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
