<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}cofr{% endblock %}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background:
        radial-gradient(circle at top, rgba(16, 185, 129, 0.14), transparent 30%),
        linear-gradient(180deg, #f4f7f6 0%, #f8fafc 42%, #ffffff 100%);
      color: #4b5563;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .wrapper {
      padding: 48px 16px;
    }
    .container {
      max-width: 520px;
      margin: 0 auto;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98) 0%, #ffffff 100%);
      border: 1px solid #dbe4ea;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 32px 40px 24px;
      border-bottom: 1px solid #e8edf2;
      background:
        radial-gradient(circle at top left, rgba(16, 185, 129, 0.14), transparent 36%),
        linear-gradient(180deg, rgba(248, 250, 252, 0.88) 0%, rgba(255, 255, 255, 0.92) 100%);
    }
    .logo-text {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.04em;
    }
    .kicker {
      margin: 0 0 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #10b981;
    }
    .heading {
      margin: 0;
      font-size: 28px;
      line-height: 1.05;
      letter-spacing: -0.05em;
      color: #0f172a;
    }
    .body {
      padding: 32px 40px;
    }
    .body p {
      margin: 0 0 16px;
      font-size: 14px;
      line-height: 1.7;
      color: #4b5563;
    }
    .body p:last-child {
      margin-bottom: 0;
    }
    .cta-row {
      text-align: left;
      padding: 12px 0 10px;
    }
    .cta {
      display: inline-block;
      background: linear-gradient(180deg, #10b981 0%, #059669 100%);
      color: #ffffff !important;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      letter-spacing: -0.02em;
    }
    .muted {
      font-size: 12px !important;
      color: #9ca3af !important;
      line-height: 1.6 !important;
    }
    .footer {
      padding: 20px 40px;
      border-top: 1px solid #e8edf2;
    }
    .footer p {
      margin: 0;
      font-size: 12px;
      color: #9ca3af;
      line-height: 1.5;
    }
    .footer a {
      color: #9ca3af;
      text-decoration: underline;
    }

    @media only screen and (max-width: 480px) {
      .wrapper { padding: 24px 12px; }
      .header { padding: 24px 24px 20px; }
      .body { padding: 24px; }
      .footer { padding: 16px 24px; }
      .heading { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="header">
        <p class="kicker">cofr account</p>
        <p class="logo-text">cofr</p>
        <h1 class="heading">{% block heading %}Keep your account secure{% endblock %}</h1>
      </div>
      <div class="body">
        {% block content %}{% endblock %}
      </div>
      <div class="footer">
        <p>&copy; {{ year | default("2026") }} cofr</p>
      </div>
    </div>
  </div>
</body>
</html>
