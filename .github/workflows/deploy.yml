name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_only:
        description: "Skip image builds and deploy an existing GHCR image tag"
        type: boolean
        required: false
        default: false
      image_tag:
        description: "Image tag to deploy when deploy_only is true. Defaults to the selected ref SHA."
        type: string
        required: false

permissions:
  contents: write
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  changes:
    name: detect changes
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.resolve.outputs.server }}
      client: ${{ steps.resolve.outputs.client }}
      any-app: ${{ steps.resolve.outputs.any-app }}
      deploy-only: ${{ steps.resolve.outputs.deploy-only }}
      image-tag: ${{ steps.resolve.outputs.image-tag }}
      registry-namespace: ${{ steps.resolve.outputs.registry-namespace }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Detect path changes
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'apps/server/**'
              - 'apps/scribe/**'
              - 'infra/*'
              - 'scripts/**'
              - '.github/workflows/deploy.yml'
            client:
              - 'apps/client/**'
              - 'infra/*'
              - 'scripts/**'
              - '.github/workflows/deploy.yml'

      - name: Resolve outputs
        id: resolve
        run: |
          owner_lc=$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "registry-namespace=ghcr.io/${owner_lc}" >> "$GITHUB_OUTPUT"

          image_tag="${{ github.event.inputs.image_tag || github.sha }}"
          echo "image-tag=${image_tag}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            deploy_only="${{ github.event.inputs.deploy_only }}"
            echo "deploy-only=${deploy_only}" >> "$GITHUB_OUTPUT"

            if [ "${deploy_only}" = "true" ]; then
              if [ -z "${{ github.event.inputs.image_tag }}" ]; then
                echo "::error::image_tag is required when deploy_only is true"
                exit 1
              fi
              echo "server=false" >> "$GITHUB_OUTPUT"
              echo "client=false" >> "$GITHUB_OUTPUT"
              echo "any-app=true" >> "$GITHUB_OUTPUT"
            else
              echo "server=true" >> "$GITHUB_OUTPUT"
              echo "client=true" >> "$GITHUB_OUTPUT"
              echo "any-app=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "deploy-only=false" >> "$GITHUB_OUTPUT"
            echo "server=${{ steps.filter.outputs.server }}" >> "$GITHUB_OUTPUT"
            echo "client=${{ steps.filter.outputs.client }}" >> "$GITHUB_OUTPUT"

            if [ "${{ steps.filter.outputs.server }}" = "true" ] || \
               [ "${{ steps.filter.outputs.client }}" = "true" ]; then
              echo "any-app=true" >> "$GITHUB_OUTPUT"
            else
              echo "any-app=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  verify-server:
    name: verify / server
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest

  verify-client:
    name: verify / client
    needs: changes
    if: needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run build

  build-server:
    name: build / server
    needs: [changes, verify-server]
    if: always() && !failure() && !cancelled() && needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./apps/server
          build-contexts: |
            scribe=./apps/scribe
          push: true
          tags: |
            ${{ needs.changes.outputs.registry-namespace }}/cofr-server:${{ needs.changes.outputs.image-tag }}
            ${{ needs.changes.outputs.registry-namespace }}/cofr-server:main

  build-client:
    name: build / client
    needs: [changes, verify-client]
    if: always() && !failure() && !cancelled() && needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./apps/client
          push: true
          tags: |
            ${{ needs.changes.outputs.registry-namespace }}/cofr-client:${{ needs.changes.outputs.image-tag }}
            ${{ needs.changes.outputs.registry-namespace }}/cofr-client:main
          build-args: |
            VITE_SENTRY_DSN=${{ secrets.SENTRY_DSN_CLIENT }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}

  deploy:
    name: deploy
    needs: [changes, build-server, build-client]
    if: >-
      always() && !failure() && !cancelled() &&
      (needs.changes.outputs.any-app == 'true')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Add deploy key
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "DEPLOY_HOST is not set"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ]; then
            echo "DEPLOY_USER is not set"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "DEPLOY_SSH_KEY is not set"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if ! ssh-keyscan -T 10 -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/tmp/ssh-keyscan.err; then
            echo "Failed to reach DEPLOY_HOST='${{ secrets.DEPLOY_HOST }}' on port 22"
            cat /tmp/ssh-keyscan.err
            exit 1
          fi
          if ! ssh -o BatchMode=yes -o ConnectTimeout=10 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" true; then
            echo "SSH connection test failed for ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
            echo "Check Reserved IP attachment, SSH firewall CIDRs, DEPLOY_USER, and DEPLOY_SSH_KEY"
            exit 1
          fi

      - name: Sync deployment files
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" 'mkdir -p /opt/cofr'
          scp -r infra scripts "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/cofr/"

      - name: Deploy on VPS
        run: |
          TAG="${{ needs.changes.outputs.image-tag }}"
          if [ "${{ needs.changes.outputs.deploy-only }}" = "true" ]; then
            SERVER_TAG="$TAG"
            CLIENT_TAG="$TAG"
          else
            if [ "${{ needs.changes.outputs.server }}" = "true" ]; then SERVER_TAG="$TAG"; else SERVER_TAG="main"; fi
            if [ "${{ needs.changes.outputs.client }}" = "true" ]; then CLIENT_TAG="$TAG"; else CLIENT_TAG="main"; fi
          fi

          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd /opt/cofr && \
             export GHCR_USERNAME='${{ github.repository_owner }}' && \
             export GHCR_TOKEN='${{ secrets.GITHUB_TOKEN }}' && \
             export GHCR_NAMESPACE='${{ needs.changes.outputs.registry-namespace }}' && \
             export SERVER_IMAGE_TAG='${SERVER_TAG}' && \
             export CLIENT_IMAGE_TAG='${CLIENT_TAG}' && \
             ./scripts/setup_prod.sh"

  release:
    name: release
    needs: [changes, deploy]
    if: always() && !failure() && !cancelled() && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release bump from merged PR
        id: release_meta
        uses: actions/github-script@v7
        with:
          script: |
            const result = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });

            const pr = result.data.find((item) => item.merged_at);
            if (!pr) {
              core.info("No merged PR associated with this commit.");
              core.setOutput("bump", "");
              return;
            }

            const labels = pr.labels.map((label) => typeof label === "string" ? label : label.name);
            const bump = labels.includes("release:major")
              ? "major"
              : labels.includes("release:minor")
                ? "minor"
                : labels.includes("release:patch")
                  ? "patch"
                  : "";

            core.setOutput("pr_number", String(pr.number));
            core.setOutput("pr_title", pr.title);
            core.setOutput("bump", bump);

      - name: Compute next release version
        id: release_version
        if: steps.release_meta.outputs.bump != ''
        run: |
          latest_tag=$(git tag --list 'v*' | sort -V | tail -n1)
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi

          version=${latest_tag#v}
          IFS=. read -r major minor patch <<EOF
          $version
          EOF

          case "${{ steps.release_meta.outputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next_version="v${major}.${minor}.${patch}"
          echo "latest=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "next=${next_version}" >> "$GITHUB_OUTPUT"

      - name: Tag release images
        if: steps.release_meta.outputs.bump != ''
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
          for image in cofr-server cofr-client; do
            docker buildx imagetools create \
              -t "${{ needs.changes.outputs.registry-namespace }}/${image}:${{ steps.release_version.outputs.next }}" \
              "${{ needs.changes.outputs.registry-namespace }}/${image}:main"
          done

      - name: Create GitHub release
        if: steps.release_meta.outputs.bump != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.next }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          body: |
            Release type: `${{ steps.release_meta.outputs.bump }}`
            Source PR: #${{ steps.release_meta.outputs.pr_number }} - ${{ steps.release_meta.outputs.pr_title }}
            Image tag: `${{ steps.release_version.outputs.next }}`
