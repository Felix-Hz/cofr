name: Deploy Production

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - labeled
  workflow_dispatch:
    inputs:
      deploy_only:
        description: "Skip image builds and deploy an existing GHCR image tag"
        type: boolean
        required: false
        default: false
      image_tag:
        description: "Image tag to deploy when deploy_only is true. Defaults to the selected ref SHA."
        type: string
        required: false

permissions:
  contents: write
  packages: write
  pull-requests: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.action == 'labeled' &&
        github.event.label.name == 'deploy' &&
        github.event.pull_request.head.repo.full_name == github.repository
      )
    runs-on: ubuntu-latest
    environment: production
    env:
      APP_IMAGE_TAG: ${{ github.event.inputs.image_tag || github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 0

      - name: Derive registry namespace
        id: registry
        run: |
          owner_lc=$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "namespace=ghcr.io/${owner_lc}" >> "$GITHUB_OUTPUT"

      - name: Validate manual deploy inputs
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_only == 'true' }}
        run: |
          if [ -z "${APP_IMAGE_TAG}" ]; then
            echo "image_tag is required when deploy_only is true"
            exit 1
          fi

      - uses: astral-sh/setup-uv@v6
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_only == 'true') }}
      - uses: oven-sh/setup-bun@v2
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_only == 'true') }}
        with:
          bun-version: "1.3.10"
      - uses: actions/setup-go@v5
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_only == 'true') }}
        with:
          go-version-file: apps/tg-bot/go.mod

      - name: Verify server
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_only == 'true') }}
        working-directory: apps/server
        run: |
          uv sync --frozen --group dev
          uv run ruff check .
          uv run ruff format --check .
          uv run pytest

      - name: Verify client
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_only == 'true') }}
        working-directory: apps/client
        run: |
          bun install --frozen-lockfile
          bun run typecheck
          bun run build

      - name: Verify tg-bot
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_only == 'true') }}
        working-directory: apps/tg-bot
        run: go build ./...

      - uses: docker/setup-buildx-action@v3
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_only == 'true') }}

      - uses: docker/login-action@v3
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_only == 'true') }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_only == 'true') }}
        uses: docker/build-push-action@v6
        with:
          context: ./apps/server
          push: true
          tags: |
            ${{ steps.registry.outputs.namespace }}/cofr-server:${{ env.APP_IMAGE_TAG }}
            ${{ steps.registry.outputs.namespace }}/cofr-server:main

      - name: Build and push client
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_only == 'true') }}
        uses: docker/build-push-action@v6
        with:
          context: ./apps/client
          push: true
          tags: |
            ${{ steps.registry.outputs.namespace }}/cofr-client:${{ env.APP_IMAGE_TAG }}
            ${{ steps.registry.outputs.namespace }}/cofr-client:main

      - name: Build and push tg-bot
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_only == 'true') }}
        uses: docker/build-push-action@v6
        with:
          context: ./apps/tg-bot
          push: true
          tags: |
            ${{ steps.registry.outputs.namespace }}/cofr-tg-bot:${{ env.APP_IMAGE_TAG }}
            ${{ steps.registry.outputs.namespace }}/cofr-tg-bot:main

      - name: Add deploy key
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "DEPLOY_HOST is not set"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ]; then
            echo "DEPLOY_USER is not set"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "DEPLOY_SSH_KEY is not set"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if ! ssh-keyscan -T 10 -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/tmp/ssh-keyscan.err; then
            echo "Failed to reach DEPLOY_HOST='${{ secrets.DEPLOY_HOST }}' on port 22"
            cat /tmp/ssh-keyscan.err
            exit 1
          fi
          if ! ssh -o BatchMode=yes -o ConnectTimeout=10 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" true; then
            echo "SSH connection test failed for ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
            echo "Check Reserved IP attachment, SSH firewall CIDRs, DEPLOY_USER, and DEPLOY_SSH_KEY"
            exit 1
          fi

      - name: Sync deployment files
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" 'mkdir -p /opt/cofr'
          scp -r infra scripts "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/cofr/"

      - name: Deploy on VPS
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd /opt/cofr && \
             export GHCR_USERNAME='${{ github.repository_owner }}' && \
             export GHCR_TOKEN='${{ secrets.GITHUB_TOKEN }}' && \
             export GHCR_NAMESPACE='${{ steps.registry.outputs.namespace }}' && \
             export DEPLOY_IMAGE_TAG='${{ env.APP_IMAGE_TAG }}' && \
             ./scripts/setup_prod.sh"

      - name: Resolve release bump from merged PR
        id: release_meta
        if: ${{ github.event_name == 'push' }}
        uses: actions/github-script@v7
        with:
          script: |
            const result = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });

            const pr = result.data.find((item) => item.merged_at);
            if (!pr) {
              core.info("No merged PR associated with this commit.");
              core.setOutput("bump", "");
              return;
            }

            const labels = pr.labels.map((label) => typeof label === "string" ? label : label.name);
            const bump = labels.includes("release:major")
              ? "major"
              : labels.includes("release:minor")
                ? "minor"
                : labels.includes("release:patch")
                  ? "patch"
                  : "";

            core.setOutput("pr_number", String(pr.number));
            core.setOutput("pr_title", pr.title);
            core.setOutput("bump", bump);

      - name: Compute next release version
        id: release_version
        if: ${{ github.event_name == 'push' && steps.release_meta.outputs.bump != '' }}
        run: |
          latest_tag=$(git tag --list 'v*' | sort -V | tail -n1)
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi

          version=${latest_tag#v}
          IFS=. read -r major minor patch <<EOF
          $version
          EOF

          case "${{ steps.release_meta.outputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next_version="v${major}.${minor}.${patch}"
          echo "latest=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "next=${next_version}" >> "$GITHUB_OUTPUT"

      - name: Tag release images
        if: ${{ github.event_name == 'push' && steps.release_meta.outputs.bump != '' }}
        run: |
          for image in cofr-server cofr-client cofr-tg-bot; do
            docker buildx imagetools create \
              -t "${{ steps.registry.outputs.namespace }}/${image}:${{ steps.release_version.outputs.next }}" \
              "${{ steps.registry.outputs.namespace }}/${image}:${{ env.APP_IMAGE_TAG }}"
          done

      - name: Create GitHub release
        if: ${{ github.event_name == 'push' && steps.release_meta.outputs.bump != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.next }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          body: |
            Release type: `${{ steps.release_meta.outputs.bump }}`
            Source PR: #${{ steps.release_meta.outputs.pr_number }} - ${{ steps.release_meta.outputs.pr_title }}
            Image tag: `${{ steps.release_version.outputs.next }}`
