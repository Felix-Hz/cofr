name: Infrastructure

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/infra.yml"
  push:
    branches:
      - main
    paths:
      - "infra/terraform/**"
      - ".github/workflows/infra.yml"
  workflow_dispatch:

jobs:
  plan:
    name: infra-plan
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes || 'false' }}
    defaults:
      run:
        working-directory: infra/terraform
    env:
      TF_IN_AUTOMATION: "true"
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-southeast-2
      TF_VAR_do_token: ${{ secrets.TF_DO_TOKEN }}
      TF_VAR_aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
      TF_VAR_aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_project_name: ${{ vars.TF_PROJECT_NAME || 'cofr' }}
      TF_VAR_project_description: ${{ vars.TF_PROJECT_DESCRIPTION || 'Infrastructure for the Cofr application' }}
      TF_VAR_environment: ${{ vars.TF_ENVIRONMENT || 'production' }}
      TF_VAR_region: ${{ vars.TF_REGION || 'syd1' }}
      TF_VAR_vpc_name: ${{ vars.TF_VPC_NAME || 'cofr-prod-vpc' }}
      TF_VAR_droplet_size: ${{ vars.TF_DROPLET_SIZE || 's-1vcpu-2gb' }}
      TF_VAR_image: ${{ vars.TF_IMAGE || 'ubuntu-24-04-x64' }}
      TF_VAR_droplet_name: ${{ vars.TF_DROPLET_NAME || 'cofr-prod' }}
      TF_VAR_ssh_key_fingerprints: ${{ vars.TF_SSH_KEY_FINGERPRINTS || '[]' }}
      TF_VAR_ssh_public_keys: ${{ vars.TF_SSH_PUBLIC_KEYS || '{}' }}
      TF_VAR_admin_user: ${{ vars.TF_ADMIN_USER || 'cofr' }}
      TF_VAR_admin_cidrs: ${{ vars.TF_ADMIN_CIDRS || '[]' }}
      TF_VAR_reserved_ip: ${{ vars.TF_RESERVED_IP || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - run: terraform fmt -check -recursive
      - run: terraform init
      - run: terraform validate
      - id: plan
        run: |
          set +e
          terraform plan -input=false -no-color -detailed-exitcode -out=tfplan
          status=$?
          set -e
          if [ "$status" -eq 1 ]; then
            exit 1
          fi
          if [ "$status" -eq 2 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
          terraform show -no-color tfplan > tfplan.txt
      - uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/terraform/tfplan.txt

  apply:
    name: infra-apply
    if: >-
      github.event_name != 'pull_request' &&
      needs.plan.outputs.has_changes == 'true'
    needs: plan
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra/terraform
    env:
      TF_IN_AUTOMATION: "true"
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-southeast-2
      TF_VAR_do_token: ${{ secrets.TF_DO_TOKEN }}
      TF_VAR_aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
      TF_VAR_aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_project_name: ${{ vars.TF_PROJECT_NAME || 'cofr' }}
      TF_VAR_project_description: ${{ vars.TF_PROJECT_DESCRIPTION || 'Infrastructure for the Cofr application' }}
      TF_VAR_environment: ${{ vars.TF_ENVIRONMENT || 'production' }}
      TF_VAR_region: ${{ vars.TF_REGION || 'syd1' }}
      TF_VAR_vpc_name: ${{ vars.TF_VPC_NAME || 'cofr-prod-vpc' }}
      TF_VAR_droplet_size: ${{ vars.TF_DROPLET_SIZE || 's-1vcpu-2gb' }}
      TF_VAR_image: ${{ vars.TF_IMAGE || 'ubuntu-24-04-x64' }}
      TF_VAR_droplet_name: ${{ vars.TF_DROPLET_NAME || 'cofr-prod' }}
      TF_VAR_ssh_key_fingerprints: ${{ vars.TF_SSH_KEY_FINGERPRINTS || '[]' }}
      TF_VAR_ssh_public_keys: ${{ vars.TF_SSH_PUBLIC_KEYS || '{}' }}
      TF_VAR_admin_user: ${{ vars.TF_ADMIN_USER || 'cofr' }}
      TF_VAR_admin_cidrs: ${{ vars.TF_ADMIN_CIDRS || '[]' }}
      TF_VAR_reserved_ip: ${{ vars.TF_RESERVED_IP || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
      - run: terraform plan -input=false -out=tfplan
      - run: terraform apply -input=false -auto-approve tfplan
