name: CI

on:
  pull_request:

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
      scribe: ${{ steps.filter.outputs.scribe }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'apps/server/**'
              - 'apps/scribe/**'
              - 'infra/*'
              - 'scripts/**'
              - '.github/workflows/ci.yml'
            client:
              - 'apps/client/**'
              - 'infra/*'
              - 'scripts/**'
              - '.github/workflows/ci.yml'
            scribe:
              - 'apps/scribe/**'
              - '.github/workflows/ci.yml'

  server:
    name: lint-test-build / server
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest

  client:
    name: lint-test-build / client
    needs: changes
    if: needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build

  scribe:
    name: lint-test / scribe
    needs: changes
    if: needs.changes.outputs.scribe == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/scribe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy -- -D warnings
      - run: cargo test

  docker-build-server:
    name: image-build / server
    needs: server
    if: needs.server.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./apps/server
          build-contexts: |
            scribe=./apps/scribe
          push: false

  docker-build-client:
    name: image-build / client
    needs: client
    if: needs.client.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./apps/client
          push: false

