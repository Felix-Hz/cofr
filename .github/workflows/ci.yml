name: CI

on:
  pull_request:

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
      tg-bot: ${{ steps.filter.outputs.tg-bot }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'apps/server/**'
              - 'infra/**'
              - '!infra/terraform/**'
              - 'scripts/**'
              - '.github/workflows/ci.yml'
            client:
              - 'apps/client/**'
              - 'infra/**'
              - '!infra/terraform/**'
              - 'scripts/**'
              - '.github/workflows/ci.yml'
            tg-bot:
              - 'apps/tg-bot/**'
              - 'infra/**'
              - '!infra/terraform/**'
              - 'scripts/**'
              - '.github/workflows/ci.yml'

  server:
    name: lint-test-build / server
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest

  client:
    name: lint-test-build / client
    needs: changes
    if: needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build

  tg-bot:
    name: lint-test-build / tg-bot
    needs: changes
    if: needs.changes.outputs.tg-bot == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/tg-bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/tg-bot/go.mod
      - run: go build ./...

  docker-build-server:
    name: image-build / server
    needs: server
    if: needs.server.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./apps/server
          push: false

  docker-build-client:
    name: image-build / client
    needs: client
    if: needs.client.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./apps/client
          push: false

  docker-build-tg-bot:
    name: image-build / tg-bot
    needs: tg-bot
    if: needs.tg-bot.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./apps/tg-bot
          push: false
