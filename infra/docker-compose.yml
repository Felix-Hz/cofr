services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql.conf:/etc/postgresql/conf.d/tuning.conf:ro
    command: postgres -c include_dir=/etc/postgresql/conf.d
    networks:
      - cofr-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Golang Telegram Bot
  tg-bot:
    restart: unless-stopped
    env_file:
      - ../apps/tg-bot/.env
    networks:
      - cofr-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "pgrep", "-f", "main" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # FastAPI Backend
  server:
    restart: unless-stopped
    env_file:
      - ../apps/server/.env
    networks:
      - cofr-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5784/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Router Frontend (SSR)
  client:
    restart: unless-stopped
    networks:
      - cofr-network
    depends_on:
      server:
        condition: service_healthy

  # Caddy Reverse Proxy
  caddy:
    image: caddy:2-alpine
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks:
      - cofr-network
    depends_on:
      - server
      - client

networks:
  cofr-network:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
