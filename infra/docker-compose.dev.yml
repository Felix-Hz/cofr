# Docker Compose override for local development
# Usage: docker compose -p cofr-dev -f infra/docker-compose.yml -f infra/docker-compose.dev.yml up

services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  server:
    build:
      context: ../apps/server
      additional_contexts:
        scribe: ../apps/scribe
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 5784 --reload"
    env_file:
      - ../apps/server/.env
      - ../apps/server/.dev.env
    ports:
      - "5784:5784"
    volumes:
      - ../apps/server:/app

  client:
    build: ../apps/client
    command: sh -c "bun install && bun run dev --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - ../apps/client:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=/api

  caddy:
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
