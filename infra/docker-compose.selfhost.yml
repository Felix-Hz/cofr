# Self-hosted overlay: public images, direct ports, no Cloudflare Tunnel
# Usage: docker compose -p cofr -f infra/docker-compose.yml -f infra/docker-compose.selfhost.yml up -d

services:
  postgres:
    deploy:
      resources:
        limits:
          memory: 512m

  server:
    image: ${GHCR_NAMESPACE:-ghcr.io/felix-hz}/cofr-server:${COFR_VERSION:-latest}
    pull_policy: always
    deploy:
      resources:
        limits:
          memory: 512m

  client:
    image: ${GHCR_NAMESPACE:-ghcr.io/felix-hz}/cofr-client:${COFR_VERSION:-latest}
    pull_policy: always
    deploy:
      resources:
        limits:
          memory: 256m

  caddy:
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile.selfhost:/etc/caddy/Caddyfile:ro
    environment:
      - COFR_DOMAIN=${COFR_DOMAIN:-localhost}
    deploy:
      resources:
        limits:
          memory: 128m
