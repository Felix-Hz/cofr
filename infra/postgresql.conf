# PostgreSQL tuning for DigitalOcean VPS (2-4 vCPU / 4-8GB RAM)
# Loaded via include_dir in Docker Compose — layers on top of defaults.

# Memory
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 8MB
maintenance_work_mem = 128MB

# WAL (Write-Ahead Logging)
wal_buffers = 16MB
checkpoint_completion_target = 0.9
min_wal_size = 256MB
max_wal_size = 1GB

# Connections
max_connections = 60

# Query planner
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Logging (lightweight, useful for debugging)
log_min_duration_statement = 500
log_checkpoints = on
log_lock_waits = on

# Autovacuum (slightly more aggressive for write-heavy workloads)
autovacuum_max_workers = 3
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.025
