# Docker Compose override for production
# Usage: docker compose -p cofr-prod -f infra/docker-compose.yml -f infra/docker-compose.prod.yml up -d

services:
  server:
    image: ${GHCR_NAMESPACE:-ghcr.io/felix-hz}/cofr-server:${SERVER_IMAGE_TAG:-${APP_IMAGE_TAG:-main}}
    pull_policy: always
    env_file:
      - ../apps/server/.env
      - ../apps/server/.prod.env

  client:
    image: ${GHCR_NAMESPACE:-ghcr.io/felix-hz}/cofr-client:${CLIENT_IMAGE_TAG:-${APP_IMAGE_TAG:-main}}
    pull_policy: always

  # PgSQL with S3 backup
  postgres:
    build:
      context: ..
      dockerfile: infra/docker/postgres/Dockerfile
    image: ${GHCR_NAMESPACE:-ghcr.io/felix-hz}/cofr-postgres:${APP_IMAGE_TAG:-main}
    pull_policy: always
    environment:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_REGION
      - S3_BUCKET_NAME
      - BACKUP_S3_BUCKET
      - BACKUP_S3_ENDPOINT
      - BACKUP_S3_REGION

  caddy:
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro

  # Cloudflare Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    environment:
      - TUNNEL_METRICS=0.0.0.0:9126
    networks:
      - cofr-network
    depends_on:
      - caddy
