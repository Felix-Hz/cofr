# Docker Compose override for production
# Usage: docker compose -p cofr-prod -f infra/docker-compose.yml -f infra/docker-compose.prod.yml up -d

services:
  server:
    image: ${GHCR_NAMESPACE:-ghcr.io/felix-hz}/cofr-server:${APP_IMAGE_TAG:-main}
    pull_policy: always
    env_file:
      - ../apps/server/.env
      - ../apps/server/.prod.env

  tg-bot:
    image: ${GHCR_NAMESPACE:-ghcr.io/felix-hz}/cofr-tg-bot:${APP_IMAGE_TAG:-main}
    pull_policy: always
    env_file:
      - ../apps/tg-bot/.env
      - ../apps/tg-bot/.prod.env

  client:
    image: ${GHCR_NAMESPACE:-ghcr.io/felix-hz}/cofr-client:${APP_IMAGE_TAG:-main}
    pull_policy: always

  caddy:
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro

  # Cloudflare Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    environment:
      - TUNNEL_METRICS=0.0.0.0:9126
    networks:
      - cofr-network
    depends_on:
      - caddy
