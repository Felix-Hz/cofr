repos:
  - repo: local
    hooks:
      - id: biome-check
        name: biome check (client)
        entry: bash -c 'cd apps/client && bunx biome check --write .'
        language: system
        files: ^apps/client/.*\.(ts|tsx|js|jsx|json)$
        pass_filenames: false

      - id: ruff-format
        name: ruff format (server)
        entry: bash -c 'cd apps/server && uv run ruff format && uv run ruff check --fix'
        language: system
        files: ^apps/server/.*\.py$
        pass_filenames: false

      - id: scribe-check
        name: cargo fmt + clippy (scribe)
        entry: bash -c 'cd apps/scribe && cargo fmt --check && cargo clippy -- -D warnings'
        language: system
        files: ^apps/scribe/.*\.(rs|toml)$
        pass_filenames: false

      - id: terraform-fmt
        name: terraform fmt (infra)
        entry: terraform fmt -recursive
        language: system
        files: ^infra/terraform/.*\.tf$
        pass_filenames: false
